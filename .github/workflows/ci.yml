name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── C++ unit tests ────────────────────────────────────────────────────────────
  cpp-tests:
    name: C++ unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ./build/tests/event_sdk_tests

  # ── Android AAR ───────────────────────────────────────────────────────────────
  android-build:
    name: Android AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build SDK AAR
        run: ./gradlew :sdk-android:assembleRelease
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: sdk-android-release
          path: platform/android/build/outputs/aar/sdk-android-release.aar

  # ── iOS build ─────────────────────────────────────────────────────────────────
  ios-build:
    name: iOS build (Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: demo/ios-app
        run: xcodegen generate

      - name: Build for Simulator
        working-directory: demo/ios-app
        run: |
          xcodebuild \
            -project EventSDKDemo.xcodeproj \
            -scheme EventSDKDemo \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || true

      - name: Build C++ tests (macOS)
        run: |
          cmake -B build-mac -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-mac --parallel
          ./build-mac/tests/event_sdk_tests
